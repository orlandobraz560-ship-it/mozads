<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tarefa - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #0f3460; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .btn { background: #e94560; padding: 10px 20px; border-radius: 10px; text-decoration: none; color: white; display: inline-block; }
        .btn-success { background: #4caf50; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; }
        label { display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>✏️ Editar Tarefa</h2>
            <form method="POST">
                <label>Título</label>
                <input type="text" name="titulo" value="{{ tarefa.titulo }}" required>
                
                <label>Descrição</label>
                <input type="text" name="descricao" value="{{ tarefa.descricao }}">
                
                <label>URL do Anúncio</label>
                <input type="text" name="url" value="{{ tarefa.url }}" required>
                
                <label>Recompensa (MZN)</label>
                <input type="number" name="recompensa" value="{{ tarefa.recompensa }}" step="0.01" required>
                
                <label>Nível Requerido</label>
                <select name="nivel_requerido">
                    {% for nivel in niveis %}
                        <option value="{{ nivel.id }}" {% if tarefa.nivel_requerido == nivel.id %}selected{% endif %}>
                            {{ nivel.nome }} ({{ nivel.recompensa_por_anuncio }} MZN)
                        </option>
                    {% endfor %}
                </select>
                
                <button type="submit" class="btn-success">💾 Salvar Alterações</button>
                <a href="/admin_tarefas" class="btn">← Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
