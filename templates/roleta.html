<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Roleta da Sorte - MOZ ADS</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px; }
        .container { max-width: 500px; background: #0f3460; border-radius: 30px; padding: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: gold; }
        .btn-girar { background: linear-gradient(45deg, #f39c12, #e67e22); border: none; color: white; font-size: 28px; font-weight: bold; padding: 15px 40px; border-radius: 60px; cursor: pointer; margin: 20px; transition: 0.2s; }
        .btn-girar:active { transform: scale(0.95); }
        .btn-girar:disabled { opacity: 0.5; cursor: not-allowed; }
        .resultado { font-size: 24px; margin-top: 20px; background: #000000aa; padding: 15px; border-radius: 20px; }
        .ja-usou { font-size: 20px; color: #f1c40f; }
        a { color: #f39c12; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎡 Roleta da Sorte 🎡</h1>
    <p>Gire a roleta e ganhe dinheiro real!<br><strong>Apenas uma chance por usuário!</strong></p>

    {% if ja_usou %}
        <div class="ja-usou">✅ Você já utilizou sua roleta.</div>
        <div class="resultado">🎉 Seu prêmio já foi creditado. Boa sorte na próxima!</div>
    {% else %}
        <div style="font-size: 40px; margin: 20px;">🎰</div>
        <button class="btn-girar" id="spinBtn">GIRAR 🎲</button>
        <div class="resultado" id="resultado"></div>
    {% endif %}
    <br>
    <a href="/painel">← Voltar ao painel</a>
</div>

<script>
    const spinBtn = document.getElementById('spinBtn');
    if (spinBtn) {
        spinBtn.addEventListener('click', function() {
            spinBtn.disabled = true;
            spinBtn.innerText = "GIRANDO...";
            document.getElementById('resultado').innerHTML = "⏳ Processando...";

            fetch('/spin_wheel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => response.json())
            .then(data => {
                if (data.sucesso) {
                    document.getElementById('resultado').innerHTML = `🎉 PARABÉNS! Você ganhou ${data.premio} MZN! 🎉<br>O valor foi adicionado ao seu saldo.`;
                    setTimeout(() => location.reload(), 3000);
                } else {
                    document.getElementById('resultado').innerHTML = `❌ ${data.erro}`;
                    spinBtn.disabled = false;
                    spinBtn.innerText = "GIRAR";
                }
            })
            .catch(error => {
                document.getElementById('resultado').innerHTML = "❌ Erro ao processar. Tente novamente.";
                spinBtn.disabled = false;
                spinBtn.innerText = "GIRAR";
            });
        });
    }
</script>
</body>
</html>
