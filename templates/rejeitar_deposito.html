<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejeitar Depósito - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: #0f3460;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
        }
        .btn-danger { background: #f44336; color: white; }
        .btn-primary { background: #2196f3; color: white; }
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
    </style>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>❌ Rejeitar Depósito</h2>
            <p>Tem certeza que deseja REJEITAR o depósito de <strong>{{ pedido.valor }} MZN</strong>?</p>
            <p>Usuário: {{ pedido.nome }}</p>
            
            <form method="POST">
                <textarea name="motivo" rows="3" placeholder="Digite o motivo da rejeição..."></textarea>
                <button type="submit" class="btn btn-danger">❌ Sim, Rejeitar</button>
                <a href="/admin_depositos" class="btn btn-primary">← Voltar</a>
            </form>
        </div>
    </div>
</body>
</html>
