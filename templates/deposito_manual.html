<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito Manual - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: #0f3460;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
        }
        .btn-success { background: #4caf50; color: white; }
        .btn-primary { background: #2196f3; color: white; }
        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin: 5px;
            width: 100%;
            margin-bottom: 10px;
        }
        .aviso {
            background: #ff9800;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 12px;
        }
    </style>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>➕ Depósito Manual</h2>
            <p>Use esta opção para adicionar saldo manualmente quando o usuário fizer transferência bancária/PIX.</p>
            
            <div class="aviso">
                ⚠️ O valor será adicionado diretamente ao saldo do usuário sem necessidade de comprovante.
            </div>
            
            <form method="POST">
                <select name="usuario_id" required>
                    <option value="">Selecione o usuário</option>
                    {% for usuario in usuarios %}
                        <option value="{{ usuario.id }}">{{ usuario.nome }} ({{ usuario.email }}) - Nível: {{ usuario.nivel_nome }}</option>
                    {% endfor %}
                </select>
                
                <select name="tipo_saldo" required>
                    <option value="saldo_principal">Saldo Principal</option>
                    <option value="saldo_comissao">Saldo Comissão</option>
                </select>
                
                <input type="number" name="valor" placeholder="Valor (MZN)" step="0.01" required>
                
                <select name="nivel_id">
                    <option value="0">Manter nível atual</option>
                    {% for nivel in niveis %}
                        <option value="{{ nivel.id }}">Mudar para {{ nivel.nome }} ({{ nivel.investimento }} MZN)</option>
                    {% endfor %}
                </select>
                
                <button type="submit" class="btn btn-success">💰 Adicionar Saldo</button>
                <a href="/deposito_manual" class="btn btn-primary">← Voltar</a>
            </form>
        </div>
    </div>
</body>
</html>
